# Per-champion configuration. Add a new champion by copying this file.
champion: ezreal

# Class order matters: index = label id. `background` must be present.
classes:
  - background
  - Q
  - W
  - E
  - R
  - Flash

# Clip sampling (used by the dataset builder and the recognizer)
clip:
  num_frames: 13        # frames per clip fed to the model (X3D-S default)
  sample_fps: 13        # frames-per-second the clip is resampled to
  # => each clip spans num_frames / sample_fps = ~1.0s of footage
  crop_size: 182        # spatial size fed to the model (X3D-S default)

  # How a frame is fit to the square model input:
  #   letterbox  - keep the WHOLE frame (aspect-preserving resize + pad). Needed
  #                to detect enemy casts anywhere on screen, incl. the edges.
  #   center_crop- legacy: resize short side then center-crop (drops the sides;
  #                only safe when the thing you track is always centered, e.g.
  #                your own champion).
  frame_mode: letterbox
  # Rectangles blacked out before the frame is used, as [x, y, w, h] fractions of
  # the frame. Masks the player's own HUD so the model can't cheat off your
  # cooldown sweep / mana flash (cues that don't exist for an enemy caster).
  # Defaults target 1080p League; tune for your layout (set [] to disable).
  hud_mask:
    - [0.25, 0.87, 0.50, 0.13]   # bottom command bar (abilities / items / spells)
    - [0.80, 0.66, 0.20, 0.34]   # minimap (bottom-right; ~25% larger than before)
  # Train-time only: random zoom-in + reposition so casts are learned at many
  # on-screen locations/scales (counteracts the centered-champion bias). 0 = off.
  spatial_jitter: 0.15

# Localization (find the tracked champion on screen before classifying).
# The recognizer crops a region around the champion instead of the whole frame,
# so it ignores other champions' VFX and enlarges small abilities.
localize:
  enabled: true
  # Champion crop region derived from the healthbar (source pixels at 1080p).
  box_size: 220          # square side of the crop placed below the healthbar
  offset_y: 5            # gap (px) from the bar bottom to the crop top
  # Healthbar HSV fallback only (name_first is primary). Red = enemies; green =
  # allies/teammates. Identity is always the champion name, not bar colour.
  red_hsv: [[0, 120, 90], [10, 255, 255], [170, 120, 90], [180, 255, 255]]
  green_hsv: [[35, 100, 90], [85, 255, 255]]
  detect_green: true
  bar_min_w: 55          # champion bars are wide; filters out minion bars
  bar_max_w: 220
  bar_min_h: 4
  bar_max_h: 22
  bar_min_aspect: 5.0    # width/height; bars are long and thin
  # Fractional [x, y, w, h] UI zones to ignore (not in-world champions):
  ignore_regions:
    - [0.0, 0.0, 0.17, 0.17]   # top-left stats/scoreboard panel
    - [0.60, 0.0, 0.40, 0.03]  # top-right status bar (score / timer)
    - [0.0, 0.0, 0.045, 1.0]   # left item/shop rail
    - [0.25, 0.85, 0.50, 0.15] # bottom command bar
    - [0.78, 0.64, 0.22, 0.36] # minimap (bottom-right)
  # Find "Ezreal" by nameplate text (same template for train / test / live).
  name_first: true
  assume_single_enemy: false
  default_champion: Ezreal
  name_templates:
    Ezreal: configs/templates/ezreal_name.png
  name_match_threshold: 0.6

# Dataset builder
dataset:
  # Positives: window centered on each labelled cast event.
  positive_offset_sec: 0.0     # shift the window center relative to the cast keypress
  # Negatives: random windows that don't overlap any event, per video.
  negatives_per_video: 40
  negative_min_gap_sec: 1.0    # min distance from any event to count as background
  val_fraction: 0.2            # held-out fraction for validation
  seed: 42

# Training
train:
  backbone: x3d_s              # x3d_s | mobilenet_baseline
  epochs: 25
  batch_size: 8
  lr: 0.0005
  weight_decay: 0.0001
  num_workers: 4
  freeze_backbone_epochs: 3    # warm up the new head before unfreezing

# Recognizer (sliding-window inference over a video file)
infer:
  stride_sec: 0.1              # finer scan (slower)
  # Q stays in the model for min_margin competition but is not emitted — tracking it
  # causes false Q@1.00 to block W/E/R/Flash from passing min_margin in live.
  track:
    - W
    - E
    - R
    - Flash
  # Per-class confidence thresholds. Missing classes fall back to default.
  # Bias toward recall (see AGENTS.md): missing a cast is worse than a false alarm.
  default_threshold: 0.98
  thresholds:
    Q: 0.98
    W: 0.98
    E: 0.98
    R: 0.98
    Flash: 0.98
  nms_window_sec: 0.6
  peak_only: true               # only emit at local score peaks (cuts FPs)
  min_margin: 0.12              # class must beat next-best ability by this much

  # Live screen capture — tuned separately from offline recognize.
  # Offline scans every 0.1s so peak_only works; live inference is ~1–2s/tick,
  # so we lower thresholds, disable peak_only, and cache localization.
  live:
    stride_sec: 0.2
    default_threshold: 0.85
    thresholds:
      W: 0.85
      E: 0.85
      R: 0.80
      Flash: 0.85
    peak_only: false            # peaks are missed when windows are sparse
    min_margin: 0.08
    nms_window_sec: 0.6
    localize_cache_sec: 1.0     # reuse last champion box (player stays put)

# Cooldown timers for the web app (src.app.server). Base CDs from Data Dragon —
# refresh after patches: python scripts/sync_timer_cds.py ezreal
# (patch 16.12.1)
timers:
  abilities:
    W: 8                         # Essence Flux
    E: [26, 23, 20, 17, 14]       # Arcane Shift
    R: [120, 105, 90]             # Trueshot Barrage
  # Auto-tracked summoners this champion's model can detect (the model emits Flash).
  summoners:
    - Flash
  # Optional: map a detected model class to a timer key (identity if omitted).
  # e.g. if a champion's ult VFX class were named differently than its key.
  class_to_key: {}
